# Railway config when the service Root Directory is set to `gas-oracle-mcp`.
# Deploying from the repo root instead? Use `/railway.toml` at the repo root.

[build]
buildCommand = "npm install --legacy-peer-deps && npm run build"
watchPatterns = ["gas-oracle-mcp/**"]

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
