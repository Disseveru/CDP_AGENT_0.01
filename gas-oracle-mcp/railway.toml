# Railway config for ChainPulse Gas Oracle.
# In the Railway dashboard, set Root Directory to `gas-oracle-mcp` and point the
# config file to `/gas-oracle-mcp/railway.toml` (absolute from repo root).

[build]
buildCommand = "npm install --legacy-peer-deps && npm run build"
watchPatterns = ["gas-oracle-mcp/**"]

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
