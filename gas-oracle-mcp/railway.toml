# Railway config for the AgentWire service when the Root Directory is `gas-oracle-mcp`.
# The folder name is legacy; the deployed service/package name is AgentWire / `agentwire-mcp`.

[build]
buildCommand = "npm install --legacy-peer-deps && npm run build"
watchPatterns = ["gas-oracle-mcp/**"]

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
preDeployCommand = "node dist/migrate.js"
