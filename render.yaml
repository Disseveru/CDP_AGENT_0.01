services:
  - type: web
    name: gas-oracle-mcp
    runtime: node
    rootDir: gas-oracle-mcp
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CDP_API_KEY
        sync: false
      - key: CDP_PRIVATE_KEY
        sync: false
      - key: CDP_WALLET_SECRET
        sync: false
      - key: NETWORK
        value: base-sepolia
      - key: PUBLIC_URL
        sync: false
      - key: PAY_TO_ADDRESS
        sync: false
      - key: FACILITATOR_URL
        sync: false
      - key: PRICE_GAS_SNAPSHOT
        value: "$0.001"
      - key: PRICE_RECOMMEND
        value: "$0.002"
