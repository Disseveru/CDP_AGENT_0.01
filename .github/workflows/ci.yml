name: CI

# PR/push checks run via Cursor Cloud Agent Automations (not GitHub-hosted runners).
# Configure at https://cursor.com/automations — see .cursor/ci-automation.md
#
# This workflow is manual-only so PRs are not blocked by GitHub Actions billing limits.

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Run test suite
        run: bash scripts/ci.sh
