# Primary CI runs in Cursor (Cloud Agents + local): `npm run ci`
# This workflow is manual-only — GitHub Actions billing may block automatic PR runs.
name: CI (manual)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Run Cursor CI script
        run: npm run ci
