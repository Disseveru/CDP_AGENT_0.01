# DEPRECATED for scheduled runs — GitHub Actions billing may suspend cron jobs.
# Primary keepalive runs in Cursor Cloud via tmux (see npm run render:keepalive:start).
# This workflow remains for optional manual wake only.
name: Render keepalive (manual)

on:
  workflow_dispatch:

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Wake AgentWire on Render
        env:
          RENDER_URL: https://cdp-agent-0-01.onrender.com
        run: |
          set -euo pipefail
          echo "Pinging ${RENDER_URL} at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          for path in /health /ready; do
            code=$(curl -sS -o /tmp/render-body.txt -w "%{http_code}" \
              --connect-timeout 30 --max-time 120 \
              "${RENDER_URL}${path}" || echo "000")
            echo "${path}: HTTP ${code}"
            if [ "${code}" = "000" ]; then
              echo "Request failed for ${path}"
              exit 1
            fi
          done

          echo "Render service is reachable."
